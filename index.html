<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的旅遊計畫</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,sans-serif;background:#0B0F1A;color:#F0EDE8;min-height:100vh;line-height:1.6}
a{text-decoration:none;color:inherit}

.hero{padding:72px 24px 48px;text-align:center;position:relative;overflow:hidden}
.hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 30% 40%,rgba(124,106,255,.18) 0%,transparent 55%),
             radial-gradient(ellipse at 75% 60%,rgba(232,149,109,.14) 0%,transparent 55%);
  pointer-events:none
}
.hero-eyebrow{font-size:12px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:#8A8A9A;margin-bottom:14px}
.hero-title{font-size:40px;font-weight:800;letter-spacing:-.02em;line-height:1.15;margin-bottom:12px}
.hero-title span{
  background:linear-gradient(135deg,#e8956d,#f5c842,#7c6aff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text
}
.hero-sub{font-size:15px;color:#8A8A9A}

.grid{max-width:900px;margin:0 auto;padding:0 20px 80px;display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px}

.trip-card{
  background:#151522;border:1px solid rgba(255,255,255,.08);border-radius:24px;
  overflow:hidden;display:flex;flex-direction:column;
  transition:transform 200ms,box-shadow 200ms,border-color 200ms;cursor:pointer;
  position:relative
}
.trip-card:hover{transform:translateY(-4px);box-shadow:0 20px 48px rgba(0,0,0,.5)}
.trip-card:hover{border-color:rgba(255,255,255,.16)}

.card-band{height:6px;width:100%;flex-shrink:0}
.card-body{padding:24px;flex:1;display:flex;flex-direction:column;gap:16px}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.card-emoji{font-size:32px;line-height:1}
.card-badge{
  font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  padding:4px 10px;border-radius:99px;flex-shrink:0;margin-top:4px
}
.card-title{font-size:20px;font-weight:700;letter-spacing:-.01em;line-height:1.3}
.card-date{font-size:13px;color:#8A8A9A}
.card-tags{display:flex;flex-wrap:wrap;gap:6px}
.tag{font-size:12px;font-weight:500;padding:4px 10px;border-radius:99px;background:rgba(255,255,255,.06);color:#C0BDB8}
.card-footer{
  margin-top:auto;padding:14px 24px;
  border-top:1px solid rgba(255,255,255,.06);
  display:flex;align-items:center;justify-content:space-between;
  font-size:13px;color:#8A8A9A
}
.card-footer .status{display:flex;align-items:center;gap:6px}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot-done{background:#10B981}
.dot-wip{background:#F59E0B;animation:pulse 1.8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.card-arrow{font-size:18px;opacity:.4}
.trip-card:hover .card-arrow{opacity:.9;transform:translateX(3px);transition:all 150ms}

/* osaka – blue */
.card-osaka .card-band{background:linear-gradient(90deg,#3B82F6,#6366F1)}
.card-osaka .card-badge{background:rgba(99,102,241,.2);color:#818CF8}
.card-osaka:hover{box-shadow:0 20px 48px rgba(99,102,241,.2)}

/* tokyo – purple-orange */
.card-tokyo .card-band{background:linear-gradient(90deg,#7C6AFF,#E8956D)}
.card-tokyo .card-badge{background:rgba(124,106,255,.2);color:#A78BFA}
.card-tokyo:hover{box-shadow:0 20px 48px rgba(124,106,255,.2)}

/* nz – teal-green */
.card-nz .card-band{background:linear-gradient(90deg,#10B981,#06B6D4)}
.card-nz .card-badge{background:rgba(16,185,129,.2);color:#34D399}
.card-nz:hover{box-shadow:0 20px 48px rgba(16,185,129,.18)}

footer{text-align:center;padding:0 0 40px;font-size:12px;color:#3A3A4A}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-eyebrow">Travel Plans · 2026</div>
  <h1 class="hero-title">選一段旅程<br><span>開始冒險</span></h1>
  <p class="hero-sub">點選下方的旅程查看完整行程規劃</p>
</div>

<div class="grid">

  <!-- Osaka -->
  <a href="2026-05-osaka/html/index.html" class="trip-card card-osaka">
    <div class="card-band"></div>
    <div class="card-body">
      <div class="card-top">
        <div class="card-emoji">🏯</div>
        <span class="card-badge">已完成規劃</span>
      </div>
      <div>
        <div class="card-title">大阪 · Osaka</div>
        <div class="card-date">2026 年 5 月 28 日 — 6 月 1 日</div>
      </div>
      <div class="card-tags">
        <span class="tag">5 天 4 夜</span>
        <span class="tag">USJ</span>
        <span class="tag">勝尾寺</span>
        <span class="tag">道頓堀</span>
        <span class="tag">OUTLET</span>
      </div>
    </div>
    <div class="card-footer">
      <span class="status"><span class="dot dot-done"></span>規劃完成</span>
      <span class="card-arrow">›</span>
    </div>
  </a>

  <!-- Tokyo -->
  <a href="2026-07-03-Tokyo/trip.html" class="trip-card card-tokyo">
    <div class="card-band"></div>
    <div class="card-body">
      <div class="card-top">
        <div class="card-emoji">🗼</div>
        <span class="card-badge">規劃中</span>
      </div>
      <div>
        <div class="card-title">東京 · Tokyo</div>
        <div class="card-date">2026 年 7 月 3 日起</div>
      </div>
      <div class="card-tags">
        <span class="tag">夏日東京</span>
        <span class="tag">規劃中</span>
      </div>
    </div>
    <div class="card-footer">
      <span class="status"><span class="dot dot-wip"></span>規劃進行中</span>
      <span class="card-arrow">›</span>
    </div>
  </a>

  <!-- New Zealand -->
  <a href="2026-09-028-NZ/NZ-2026-travel-plan.html" class="trip-card card-nz">
    <div class="card-band"></div>
    <div class="card-body">
      <div class="card-top">
        <div class="card-emoji">🥝</div>
        <span class="card-badge">規劃中</span>
      </div>
      <div>
        <div class="card-title">紐西蘭 · New Zealand</div>
        <div class="card-date">2026 年 9 月 28 日起</div>
      </div>
      <div class="card-tags">
        <span class="tag">自駕</span>
        <span class="tag">南北島</span>
        <span class="tag">規劃中</span>
      </div>
    </div>
    <div class="card-footer">
      <span class="status"><span class="dot dot-wip"></span>規劃進行中</span>
      <span class="card-arrow">›</span>
    </div>
  </a>

</div>

<footer>2026 旅遊計畫集</footer>

</body>
</html>
